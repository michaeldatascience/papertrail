<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 24px; font-weight: 700; fill: #1a2332; }
    .subtitle { font-size: 13px; fill: #6b7280; font-style: italic; }
    .playbook-title { font-size: 18px; font-weight: 700; fill: #1a2332; }
    .section-title { font-size: 15px; font-weight: 700; fill: #ffffff; }
    .section-label { font-size: 10px; fill: #ffffff; opacity: 0.75; letter-spacing: 1px; font-weight: 700; }
    .section-desc { font-size: 11px; fill: #ffffff; opacity: 0.9; }
    .governs-label { font-size: 11px; font-weight: 600; fill: #4b5563; }
    .governs-text { font-size: 11px; fill: #374151; }
    .stage-label { font-size: 10px; font-weight: 700; fill: #9ca3af; letter-spacing: 0.5px; }
    .inherit-label { font-size: 12px; font-weight: 600; fill: #1a2332; }
    .inherit-text { font-size: 11px; fill: #374151; }
  </style>

  <rect width="1200" height="820" fill="#fafbfc"/>

  <text x="60" y="40" class="title">Playbook Anatomy</text>
  <text x="60" y="62" class="subtitle">One Playbook defines everything needed to process one document type. Six config sections. Stored as jsonb rows.</text>

  <!-- Central Playbook container -->
  <g transform="translate(60, 100)">
    <rect width="1080" height="480" rx="10" fill="#ffffff" stroke="#2d4a6b" stroke-width="2"/>

    <!-- Playbook header -->
    <rect x="0" y="0" width="1080" height="55" rx="10" fill="#2d4a6b"/>
    <rect x="0" y="40" width="1080" height="15" fill="#2d4a6b"/>
    <text x="30" y="35" class="playbook-title" fill="#ffffff">Playbook: indian_cheque</text>
    <text x="1050" y="35" class="section-desc" text-anchor="end" fill="#ffffff">v1.0 · extends: _base</text>

    <!-- 6 sections in 2 rows of 3 -->

    <!-- Row 1 -->
    <!-- Section: meta -->
    <g transform="translate(30, 80)">
      <rect width="330" height="180" rx="8" fill="#2d4a6b"/>
      <text x="20" y="25" class="section-label">SECTION 01</text>
      <text x="20" y="50" class="section-title">meta</text>
      <line x1="20" y1="60" x2="310" y2="60" stroke="#ffffff" opacity="0.25"/>

      <text x="20" y="82" class="section-desc" font-weight="600">Identity + engines</text>
      <text x="20" y="100" class="section-desc">• Name, slug, version</text>
      <text x="20" y="116" class="section-desc">• What this Playbook extends</text>
      <text x="20" y="132" class="section-desc">• Which engines for OCR, layout,</text>
      <text x="20" y="146" class="section-desc">  tables, vision</text>
      <text x="20" y="162" class="section-desc">• Pre-upload check thresholds</text>
    </g>

    <!-- Section: classify -->
    <g transform="translate(375, 80)">
      <rect width="330" height="180" rx="8" fill="#3d5d7a"/>
      <text x="20" y="25" class="section-label">SECTION 02</text>
      <text x="20" y="50" class="section-title">classify</text>
      <line x1="20" y1="60" x2="310" y2="60" stroke="#ffffff" opacity="0.25"/>

      <text x="20" y="82" class="section-desc" font-weight="600">How to identify the doc type</text>
      <text x="20" y="100" class="section-desc">• Prompt template reference</text>
      <text x="20" y="116" class="section-desc">• Candidate list + descriptions</text>
      <text x="20" y="132" class="section-desc">• confidence_threshold (auto-pass)</text>
      <text x="20" y="148" class="section-desc">• hitl_threshold (human picks)</text>
      <text x="20" y="164" class="section-desc">• on_no_match action</text>
    </g>

    <!-- Section: schema -->
    <g transform="translate(720, 80)">
      <rect width="330" height="180" rx="8" fill="#4d7099"/>
      <text x="20" y="25" class="section-label">SECTION 03</text>
      <text x="20" y="50" class="section-title">schema</text>
      <line x1="20" y1="60" x2="310" y2="60" stroke="#ffffff" opacity="0.25"/>

      <text x="20" y="82" class="section-desc" font-weight="600">What to extract and how</text>
      <text x="20" y="100" class="section-desc">• mode: schema (strict) or natural</text>
      <text x="20" y="116" class="section-desc">• Element list (name, type, required,</text>
      <text x="20" y="132" class="section-desc">  critical, description, region_hint)</text>
      <text x="20" y="148" class="section-desc">• Pydantic-compatible types</text>
      <text x="20" y="164" class="section-desc">• Nested lists and objects supported</text>
    </g>

    <!-- Row 2 -->
    <!-- Section: validate -->
    <g transform="translate(30, 280)">
      <rect width="330" height="180" rx="8" fill="#5d7fa8"/>
      <text x="20" y="25" class="section-label">SECTION 04</text>
      <text x="20" y="50" class="section-title">validate</text>
      <line x1="20" y1="60" x2="310" y2="60" stroke="#ffffff" opacity="0.25"/>

      <text x="20" y="82" class="section-desc" font-weight="600">Per-element + cross-field rules</text>
      <text x="20" y="100" class="section-desc">• Per element: hard XOR soft</text>
      <text x="20" y="116" class="section-desc">• Cross-field consistency checks</text>
      <text x="20" y="132" class="section-desc">• Scoring: pass threshold, weights</text>
      <text x="20" y="148" class="section-desc">• Correction config: max attempts,</text>
      <text x="20" y="164" class="section-desc">  merge strategy, on exhaustion</text>
    </g>

    <!-- Section: rules -->
    <g transform="translate(375, 280)">
      <rect width="330" height="180" rx="8" fill="#c78a3c"/>
      <text x="20" y="25" class="section-label">SECTION 05</text>
      <text x="20" y="50" class="section-title">rules</text>
      <line x1="20" y1="60" x2="310" y2="60" stroke="#ffffff" opacity="0.25"/>

      <text x="20" y="82" class="section-desc" font-weight="600">Decision layer logic</text>
      <text x="20" y="100" class="section-desc">• Conditions (filters, flags, rejects)</text>
      <text x="20" y="116" class="section-desc">• Transformations (enrich, tool calls)</text>
      <text x="20" y="132" class="section-desc">• Expression language for conditions</text>
      <text x="20" y="148" class="section-desc">• Action precedence override</text>
      <text x="20" y="164" class="section-desc">• Evaluation order matters</text>
    </g>

    <!-- Section: postprocess -->
    <g transform="translate(720, 280)">
      <rect width="330" height="180" rx="8" fill="#1a2332"/>
      <text x="20" y="25" class="section-label">SECTION 06</text>
      <text x="20" y="50" class="section-title">postprocess</text>
      <line x1="20" y1="60" x2="310" y2="60" stroke="#ffffff" opacity="0.25"/>

      <text x="20" y="82" class="section-desc" font-weight="600">What to do with the output</text>
      <text x="20" y="100" class="section-desc">• Export format (json, csv, etc)</text>
      <text x="20" y="116" class="section-desc">• Per-outcome actions:</text>
      <text x="20" y="132" class="section-desc">  on_approve / on_flag / on_reject</text>
      <text x="20" y="148" class="section-desc">  / on_escalate</text>
      <text x="20" y="164" class="section-desc">• Notification + archive rules</text>
    </g>
  </g>

  <!-- Stage mapping row -->
  <g transform="translate(60, 610)">
    <text x="0" y="0" class="stage-label">WHICH STAGE EACH SECTION GOVERNS</text>

    <!-- Mapping bars -->
    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="1080" height="40" rx="4" fill="#ffffff" stroke="#e5e7eb"/>

      <g transform="translate(20, 10)">
        <text x="0" y="10" class="governs-label" font-size="10">Pre-upload →</text>
        <text x="0" y="25" class="governs-text" font-size="10" fill="#2d4a6b" font-weight="700">meta</text>
      </g>

      <g transform="translate(130, 10)">
        <text x="0" y="10" class="governs-label" font-size="10">Classify →</text>
        <text x="0" y="25" class="governs-text" font-size="10" fill="#3d5d7a" font-weight="700">classify</text>
      </g>

      <g transform="translate(245, 10)">
        <text x="0" y="10" class="governs-label" font-size="10">Extract Pass A/B →</text>
        <text x="0" y="25" class="governs-text" font-size="10" fill="#2d4a6b" font-weight="700">meta.engines</text>
      </g>

      <g transform="translate(410, 10)">
        <text x="0" y="10" class="governs-label" font-size="10">Extract Pass C →</text>
        <text x="0" y="25" class="governs-text" font-size="10" fill="#4d7099" font-weight="700">schema</text>
      </g>

      <g transform="translate(565, 10)">
        <text x="0" y="10" class="governs-label" font-size="10">Extract Pass D →</text>
        <text x="0" y="25" class="governs-text" font-size="10" fill="#5d7fa8" font-weight="700">validate</text>
      </g>

      <g transform="translate(720, 10)">
        <text x="0" y="10" class="governs-label" font-size="10">Correction →</text>
        <text x="0" y="25" class="governs-text" font-size="10" fill="#5d7fa8" font-weight="700">validate.correction</text>
      </g>

      <g transform="translate(870, 10)">
        <text x="0" y="10" class="governs-label" font-size="10">Decide →</text>
        <text x="0" y="25" class="governs-text" font-size="10" fill="#c78a3c" font-weight="700">rules</text>
      </g>

      <g transform="translate(980, 10)">
        <text x="0" y="10" class="governs-label" font-size="10">Act →</text>
        <text x="0" y="25" class="governs-text" font-size="10" fill="#1a2332" font-weight="700">postprocess</text>
      </g>
    </g>
  </g>

  <!-- Inheritance note -->
  <g transform="translate(60, 700)">
    <rect width="1080" height="100" rx="6" fill="#fef3e7" stroke="#c78a3c" stroke-width="1"/>
    <text x="20" y="25" class="section-label" fill="#c78a3c">INHERITANCE MODEL</text>

    <text x="20" y="50" class="inherit-label">extends: _base</text>
    <text x="20" y="70" class="inherit-text">A Playbook inherits from _base by default. The loader merges the Playbook's config with its parent's, with the Playbook's values winning.</text>
    <text x="20" y="88" class="inherit-text">A minimal Playbook only needs to declare what differs from _base. New document types are typically 20-80 lines of JSON overrides.</text>
  </g>
</svg>
