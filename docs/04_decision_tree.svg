<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 24px; font-weight: 700; fill: #1a2332; }
    .subtitle { font-size: 13px; fill: #6b7280; font-style: italic; }
    .node-title { font-size: 14px; font-weight: 600; fill: #1a2332; }
    .node-text { font-size: 11px; fill: #374151; }
    .branch-label { font-size: 11px; fill: #4b5563; font-style: italic; }
    .outcome-title { font-size: 18px; font-weight: 700; fill: #ffffff; }
    .outcome-desc { font-size: 11px; fill: #ffffff; opacity: 0.9; }
    .section-label { font-size: 11px; font-weight: 700; fill: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .precedence-label { font-size: 12px; font-weight: 600; fill: #1a2332; }
    .precedence-text { font-size: 11px; fill: #374151; }
  </style>

  <rect width="1200" height="900" fill="#fafbfc"/>

  <text x="60" y="40" class="title">Decision Routing</text>
  <text x="60" y="62" class="subtitle">How conditions fire, how actions reconcile, where the document ends up</text>

  <!-- Entry: validated extraction -->
  <g transform="translate(475, 100)">
    <rect width="250" height="70" rx="8" fill="#ffffff" stroke="#2d4a6b" stroke-width="2"/>
    <text x="125" y="28" class="node-title" text-anchor="middle">Validated Extraction</text>
    <text x="125" y="48" class="node-text" text-anchor="middle">All elements passed validation</text>
    <text x="125" y="62" class="node-text" text-anchor="middle" fill="#6b7280">(or correction loop succeeded)</text>
  </g>

  <path d="M 600 170 L 600 200" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision layer box -->
  <g transform="translate(225, 200)">
    <rect width="750" height="170" rx="8" fill="#fef3e7" stroke="#c78a3c" stroke-width="2"/>

    <text x="375" y="28" class="section-label" fill="#c78a3c" text-anchor="middle">DECISION LAYER</text>

    <!-- Conditions -->
    <g transform="translate(30, 50)">
      <rect width="320" height="100" rx="6" fill="#ffffff" stroke="#c78a3c" stroke-width="1"/>
      <text x="160" y="22" class="node-title" text-anchor="middle">Conditions</text>
      <text x="160" y="42" class="node-text" text-anchor="middle">Evaluated in declared order</text>

      <text x="15" y="62" class="node-text" font-weight="600">Each condition either:</text>
      <text x="15" y="78" class="node-text">• fires (produces action + reason)</text>
      <text x="15" y="92" class="node-text">• skips (expression false)</text>
    </g>

    <!-- Transformations -->
    <g transform="translate(400, 50)">
      <rect width="320" height="100" rx="6" fill="#ffffff" stroke="#c78a3c" stroke-width="1"/>
      <text x="160" y="22" class="node-title" text-anchor="middle">Transformations</text>
      <text x="160" y="42" class="node-text" text-anchor="middle">Tool calls · enrichment · derived fields</text>

      <text x="15" y="62" class="node-text" font-weight="600">Examples:</text>
      <text x="15" y="78" class="node-text">• ifsc_api(ifsc) → bank_branch</text>
      <text x="15" y="92" class="node-text">• days_since(date) → cheque_age</text>
    </g>
  </g>

  <!-- Precedence resolver -->
  <path d="M 600 370 L 600 400" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <g transform="translate(400, 400)">
    <rect width="400" height="90" rx="8" fill="#1a2332"/>
    <text x="200" y="28" class="section-label" fill="#ffffff" opacity="0.8" text-anchor="middle">ACTION PRECEDENCE RESOLVER</text>
    <text x="200" y="52" class="outcome-desc" text-anchor="middle" font-weight="600">reject &gt; escalate &gt; flag &gt; approve</text>
    <text x="200" y="74" class="outcome-desc" text-anchor="middle">Strongest action wins. All fired conditions logged.</text>
  </g>

  <!-- Four outcomes -->
  <path d="M 450 490 L 150 560" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 540 490 L 420 560" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 660 490 L 770 560" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 750 490 L 1050 560" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Approve -->
  <g transform="translate(60, 560)">
    <rect width="180" height="160" rx="8" fill="#3d7a4e"/>
    <text x="90" y="32" class="outcome-title" text-anchor="middle">APPROVE</text>
    <line x1="30" y1="48" x2="150" y2="48" stroke="#ffffff" opacity="0.3"/>
    <text x="90" y="72" class="outcome-desc" text-anchor="middle">No condition fired</text>
    <text x="90" y="90" class="outcome-desc" text-anchor="middle">or all fired ones</text>
    <text x="90" y="108" class="outcome-desc" text-anchor="middle">produced "approve"</text>
    <line x1="30" y1="124" x2="150" y2="124" stroke="#ffffff" opacity="0.3"/>
    <text x="90" y="144" class="outcome-desc" text-anchor="middle" font-weight="600">Export JSON</text>
  </g>

  <!-- Flag -->
  <g transform="translate(330, 560)">
    <rect width="180" height="160" rx="8" fill="#c78a3c"/>
    <text x="90" y="32" class="outcome-title" text-anchor="middle">FLAG</text>
    <line x1="30" y1="48" x2="150" y2="48" stroke="#ffffff" opacity="0.3"/>
    <text x="90" y="72" class="outcome-desc" text-anchor="middle">At least one</text>
    <text x="90" y="90" class="outcome-desc" text-anchor="middle">condition fired "flag"</text>
    <text x="90" y="108" class="outcome-desc" text-anchor="middle">(no stronger action)</text>
    <line x1="30" y1="124" x2="150" y2="124" stroke="#ffffff" opacity="0.3"/>
    <text x="90" y="144" class="outcome-desc" text-anchor="middle" font-weight="600">Export + warnings</text>
  </g>

  <!-- Escalate -->
  <g transform="translate(680, 560)">
    <rect width="180" height="160" rx="8" fill="#b5554a"/>
    <text x="90" y="32" class="outcome-title" text-anchor="middle">ESCALATE</text>
    <line x1="30" y1="48" x2="150" y2="48" stroke="#ffffff" opacity="0.3"/>
    <text x="90" y="72" class="outcome-desc" text-anchor="middle">Correction loop</text>
    <text x="90" y="90" class="outcome-desc" text-anchor="middle">exhausted OR</text>
    <text x="90" y="108" class="outcome-desc" text-anchor="middle">condition fired "escalate"</text>
    <line x1="30" y1="124" x2="150" y2="124" stroke="#ffffff" opacity="0.3"/>
    <text x="90" y="144" class="outcome-desc" text-anchor="middle" font-weight="600">HITL + suggestion</text>
  </g>

  <!-- Reject -->
  <g transform="translate(960, 560)">
    <rect width="180" height="160" rx="8" fill="#7a2e3e"/>
    <text x="90" y="32" class="outcome-title" text-anchor="middle">REJECT</text>
    <line x1="30" y1="48" x2="150" y2="48" stroke="#ffffff" opacity="0.3"/>
    <text x="90" y="72" class="outcome-desc" text-anchor="middle">Hard condition</text>
    <text x="90" y="90" class="outcome-desc" text-anchor="middle">fired "reject"</text>
    <text x="90" y="108" class="outcome-desc" text-anchor="middle">(business rule violation)</text>
    <line x1="30" y1="124" x2="150" y2="124" stroke="#ffffff" opacity="0.3"/>
    <text x="90" y="144" class="outcome-desc" text-anchor="middle" font-weight="600">Export + reason</text>
  </g>

  <!-- Legend: typical firing conditions -->
  <g transform="translate(60, 770)">
    <rect width="1080" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="20" y="25" class="section-label">TYPICAL CONDITIONS BY OUTCOME</text>

    <g transform="translate(20, 45)">
      <circle cx="6" cy="6" r="5" fill="#3d7a4e"/>
      <text x="18" y="10" class="precedence-label">Approve:</text>
      <text x="80" y="10" class="precedence-text">no risk conditions fired · confidence above threshold · no pending flags</text>
    </g>

    <g transform="translate(20, 63)">
      <circle cx="6" cy="6" r="5" fill="#c78a3c"/>
      <text x="18" y="10" class="precedence-label">Flag:</text>
      <text x="58" y="10" class="precedence-text">high-value transaction · low aggregate confidence · warnings accumulated · post-dated · unusual pattern</text>
    </g>

    <g transform="translate(20, 81)">
      <circle cx="6" cy="6" r="5" fill="#b5554a"/>
      <text x="18" y="10" class="precedence-label">Escalate:</text>
      <text x="82" y="10" class="precedence-text">correction loop failed · critical field unresolved · compliance risk detected · human judgment needed</text>
    </g>

    <g transform="translate(20, 99)">
      <circle cx="6" cy="6" r="5" fill="#7a2e3e"/>
      <text x="18" y="10" class="precedence-label">Reject:</text>
      <text x="70" y="10" class="precedence-text">stale cheque · negative balance · invalid format · failed hard business rule · regulatory block</text>
    </g>
  </g>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>
</svg>
